# ==============================================================================
# General
# ==============================================================================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g history-limit 10000
set -g mouse on
set -sg escape-time 0
set -g focus-events on

# ==============================================================================
# Key Bindings
# ==============================================================================
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -r [ previous-window
bind -r ] next-window

# ==============================================================================
# Copy Mode (vi)
# ==============================================================================
setw -g mode-keys vi

bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle

# ==============================================================================
# Status Bar
# ==============================================================================
set -g status on
set -g status-interval 5
set -g status-position bottom

set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

set -g status-left-length 40
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#89b4fa]"

set -g status-right-length 60
set -g status-right "#[fg=#6c7086]#H  #[fg=#cdd6f4]%H:%M  %Y-%m-%d "

setw -g window-status-format         " #I:#W "
setw -g window-status-current-format "#[bg=#313244,fg=#cdd6f4,bold] #I:#W "
setw -g window-status-style          "fg=#6c7086"

set -g pane-border-style        "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

set -g message-style "bg=#313244,fg=#cdd6f4"
